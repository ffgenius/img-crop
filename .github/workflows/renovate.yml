name: Renovate

on:
  schedule:
    # 北京时间早上 9 点 (UTC+8) → UTC 凌晨 1 点，每周一
    - cron: '37 1 * * 1'
  workflow_dispatch: # 支持手动触发

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v41
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
